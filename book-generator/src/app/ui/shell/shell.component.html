<div class="flex h-screen bg-gray-50 dark:bg-gray-950 overflow-hidden">
  <!-- Sidebar -->
  <aside class="w-[260px] flex-shrink-0 border-r border-gray-200 dark:border-gray-800 bg-white dark:bg-gray-900 shadow-lg">
    <div class="flex flex-col h-full">
      <!-- Logo/Header -->
      <div class="h-[100px] px-8 border-b border-gray-100 dark:border-gray-800 flex justify-center items-center">
        <button
          (click)="navigateToConfig()"
          class="hover:opacity-80 transition-opacity">
          <img 
            src="assets/autobook_trans.png" 
            alt="Autobook Logo" 
            class="w-full max-w-[180px] h-[80px] rounded-xl shadow-md object-contain">
        </button>
      </div>

      <!-- Navigation -->
      <nav class="flex-1 p-4 space-y-1.5">
        <button
          (click)="navigateToConfig()"
          class="w-full flex items-center gap-3 px-4 py-3 text-sm font-medium rounded-xl transition-all duration-200"
          [class]="router.isActive('/config', true) 
            ? 'bg-brand-50 dark:bg-brand-900/30 text-brand-600 dark:text-brand-400 shadow-sm' 
            : 'text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-800'">
          <div class="w-8 h-8 rounded-lg flex items-center justify-center"
            [class]="router.isActive('/config', true) ? 'bg-brand-100 dark:bg-brand-800' : 'bg-gray-100 dark:bg-gray-800'">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path>
            </svg>
          </div>
          {{ t('nav.configure') }}
        </button>
        
        <button
          (click)="navigateToGenerator()"
          class="w-full flex items-center gap-3 px-4 py-3 text-sm font-medium rounded-xl transition-all duration-200"
          [class]="router.isActive('/generator', true) 
            ? 'bg-brand-50 dark:bg-brand-900/30 text-brand-600 dark:text-brand-400 shadow-sm' 
            : 'text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-800'">
          <div class="w-8 h-8 rounded-lg flex items-center justify-center"
            [class]="router.isActive('/generator', true) ? 'bg-brand-100 dark:bg-brand-800' : 'bg-gray-100 dark:bg-gray-800'">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path>
            </svg>
          </div>
          {{ t('nav.generate') }}
        </button>
        
        <button
          (click)="navigateToViewer()"
          class="w-full flex items-center gap-3 px-4 py-3 text-sm font-medium rounded-xl transition-all duration-200"
          [class]="router.isActive('/viewer', true) 
            ? 'bg-brand-50 dark:bg-brand-900/30 text-brand-600 dark:text-brand-400 shadow-sm' 
            : 'text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-800'">
          <div class="w-8 h-8 rounded-lg flex items-center justify-center"
            [class]="router.isActive('/viewer', true) ? 'bg-brand-100 dark:bg-brand-800' : 'bg-gray-100 dark:bg-gray-800'">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path>
            </svg>
          </div>
          {{ t('nav.view') }}
        </button>
        
        <button
          (click)="navigateToExport()"
          class="w-full flex items-center gap-3 px-4 py-3 text-sm font-medium rounded-xl transition-all duration-200"
          [class]="router.isActive('/export', true) 
            ? 'bg-brand-50 dark:bg-brand-900/30 text-brand-600 dark:text-brand-400 shadow-sm' 
            : 'text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-800'">
          <div class="w-8 h-8 rounded-lg flex items-center justify-center"
            [class]="router.isActive('/export', true) ? 'bg-brand-100 dark:bg-brand-800' : 'bg-gray-100 dark:bg-gray-800'">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path>
            </svg>
          </div>
          {{ t('nav.export') }}
        </button>
      </nav>

      <!-- Bottom Section -->
      <div class="border-t border-gray-100 dark:border-gray-800">
        <!-- Status Indicator with Model and Settings -->
        <div class="p-4 space-y-3">
          <div class="flex items-center justify-between">
            <div class="flex items-center gap-2">
              <div class="w-2.5 h-2.5 rounded-full ring-2 ring-white dark:ring-gray-900 animate-pulse" 
                [class]="isConfigured() ? 'bg-green-500' : 'bg-red-500'"></div>
              <span class="text-xs font-medium text-gray-600 dark:text-gray-400">
                {{ isConfigured() ? t('shell.connected') : t('shell.notConnected') }}
              </span>
            </div>
            <button
              (click)="navigateToSettings()"
              class="p-1.5 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors"
              [title]="t('nav.settings')">
              <svg class="w-4 h-4 text-gray-500 dark:text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
              </svg>
            </button>
          </div>
          <div class="flex items-center gap-2 px-3 py-2 bg-gray-50 dark:bg-gray-800 rounded-lg">
            <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
            </svg>
            <span class="text-xs font-medium text-gray-500 dark:text-gray-400">{{ t('shell.model') }}:</span>
            <span class="text-sm font-medium text-gray-700 dark:text-gray-300 truncate">
              {{ getModelName() }}
            </span>
          </div>
        </div>

        <!-- Theme Toggle -->
        <div class="p-4 border-t border-gray-100 dark:border-gray-800">
          <button
            (click)="toggleTheme()"
            class="w-full flex items-center justify-between px-4 py-2.5 text-sm font-medium text-gray-700 dark:text-gray-300 rounded-xl hover:bg-gray-100 dark:hover:bg-gray-800 transition-all duration-200">
            <div class="flex items-center gap-3">
              @if (isDarkMode) {
                <svg class="w-5 h-5 text-brand-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path>
                </svg>
                <span>{{ t('shell.darkMode') }}</span>
              } @else {
                <svg class="w-5 h-5 text-brand-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path>
                </svg>
                <span>{{ t('shell.lightMode') }}</span>
              }
            </div>
            <div class="w-10 h-5 bg-gray-200 dark:bg-gray-700 rounded-full relative transition-colors">
              <div class="w-4 h-4 bg-white rounded-full absolute top-0.5 transition-transform shadow-sm"
                [class.translate-x-5]="isDarkMode"
                [class.translate-x-0.5]="!isDarkMode">
              </div>
            </div>
          </button>
        </div>
      </div>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="flex-1 flex flex-col overflow-hidden">
    <!-- Topbar -->
    <div class="flex items-center justify-between px-8 py-5 border-b border-gray-200 dark:border-gray-800 bg-white dark:bg-gray-900 shadow-sm">
      <div>
        <h2 class="text-xl font-semibold text-gray-900 dark:text-white">
          {{ getActivePageTitle() }}
        </h2>
        <p class="text-sm text-gray-500 dark:text-gray-400 mt-0.5">
          {{ getActivePageSubtitle() }}
        </p>
      </div>
      
      <div class="flex items-center gap-4">
        <!-- Language Selector -->
        <button
          (click)="toggleLanguage()"
          class="flex items-center gap-2 px-3 py-1.5 bg-gray-100 dark:bg-gray-800 rounded-full hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors">
          <span class="text-xs font-medium text-gray-600 dark:text-gray-400">
            {{ isEnglish() ? '🇬🇧 EN' : '🇵🇱 PL' }}
          </span>
        </button>
      </div>
    </div>

    <!-- Page Content -->
    <div class="flex-1 overflow-y-auto p-8 bg-gradient-to-br from-gray-50 to-gray-100 dark:from-gray-950 dark:to-gray-900">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>
